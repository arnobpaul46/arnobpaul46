name: generate animation

on:
  # প্রতি ২৪ ঘণ্টা পর পর অটোমেটিক চলবে
  schedule:
    - cron: "0 */24 * * *" 
  
  # যেকোনো সময় ম্যানুয়ালি রান করা যাবে
  workflow_dispatch:
  
  # মেইন ব্রাঞ্চে কোনো পুশ হলে রান হবে
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # আপনার কন্ট্রিবিউশন থেকে স্নেক এনিমেশন তৈরি করবে
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arnobpaul46
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # তৈরি করা এনিমেশনটি 'output' নামক একটি নতুন ব্রাঞ্চে সেভ করবে
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
